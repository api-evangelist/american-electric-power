aid: american-electric-power
url: https://raw.githubusercontent.com/api-evangelist/american-electric-power/refs/heads/main/apis.yml
name: American Electric Power
description: >-
  American Electric Power (AEP) is one of the largest electric utilities in the
  United States, delivering electricity to more than 5.6 million customers across
  11 states through its regulated utility subsidiaries including AEP Ohio, AEP Texas,
  Appalachian Power, Indiana Michigan Power, Kentucky Power, Public Service Company
  of Oklahoma, and Southwestern Electric Power Company. AEP operates the nation's
  largest electricity transmission network spanning over 40,000 miles and maintains
  approximately 31,000 megawatts of generating capacity.
