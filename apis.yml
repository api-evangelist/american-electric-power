common:
  - type: Website
    url: https://www.aep.com
  - type: Portal
    url: https://www.aep.com/about
    name: About AEP
  - type: Features
    data:
      - name: Electricity Transmission
        description: >-
          AEP operates the largest electricity transmission network in the nation,
          spanning more than 40,000 miles across its 11-state service territory.
      - name: Electric Power Generation
        description: >-
          Approximately 31,000 megawatts of diverse generating capacity including
          coal, natural gas, nuclear, wind, and solar energy sources.
      - name: Regulated Utility Services
        description: >-
          Regulated electric distribution and customer service through seven operating
          utility subsidiaries serving residential, commercial, and industrial customers.
      - name: Energy Solutions for Business
        description: >-
          Commercial and industrial energy management, demand response programs, and
          customized energy solutions for large business customers.
      - name: Economic Development Support
        description: >-
          Site selection assistance, regional resource analysis, and energy infrastructure
          planning to support economic development across AEP's service territory.
      - name: Renewable Energy Programs
        description: >-
          Renewable energy options and clean energy transition programs for customers
          seeking sustainable electricity solutions.
      - name: Outage Management
        description: >-
          Real-time outage reporting, tracking, and restoration services for residential
          and business customers across all operating company service territories.
      - name: Smart Grid Infrastructure
        description: >-
          Advanced metering infrastructure and smart grid investments to improve reliability
          and enable future energy management capabilities.
  - type: UseCases
    data:
      - name: Residential Electricity Service
        description: >-
          Providing reliable electric service, billing, outage management, and energy
          efficiency programs to homeowners and renters across 11 states.
      - name: Commercial and Industrial Power
        description: >-
          Meeting the high-voltage, high-capacity power needs of commercial businesses
          and industrial manufacturers with reliable transmission and distribution.
      - name: Renewable Energy Procurement
        description: >-
          Enabling large customers and businesses to procure renewable energy and
          meet their sustainability and corporate ESG goals.
      - name: Economic Development
        description: >-
          Supporting businesses evaluating new facility locations with energy cost,
          capacity, and infrastructure data for AEP service territories.
      - name: Energy Efficiency Programs
        description: >-
          Delivering rebate programs and energy efficiency resources to help customers
          reduce consumption and lower their electricity costs.
  - type: Integrations
    data:
      - name: Green Button Connect
        description: >-
          AEP operating companies participate in the Green Button initiative, enabling
          customers to download or share their energy usage data with authorized
          third-party applications.
      - name: Demand Response Programs
        description: >-
          Integration with grid operators (PJM, MISO, SPP) for demand response and
          ancillary services markets.
      - name: Net Metering
        description: >-
          Integration with customer-owned solar and distributed generation systems
          through net metering programs across AEP operating companies.
